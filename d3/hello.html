<!DOCTYPE html>
<html lang="en">
    <head>
          <meta charset="UTF-8">
            <title>Interactive Gene Network</title>
              <script src="https://d3js.org/d3.v7.min.js"></script>
                <style>
    body {
              font-family: sans-serif;
                    margin: 0;
                        }

        .node circle {
                  fill: steelblue;
                        stroke: #fff;
                              stroke-width: 1.5px;
                                    cursor: grab;
                                        }

            .link {
                      stroke: #999;
                            stroke-opacity: 0.6;
                                }

                .tooltip {
                          position: absolute;
                                background: lightyellow;
                                      border: 1px solid #ccc;
                                            padding: 5px;
                                                  pointer-events: none;
                                                        font: 12px sans-serif;
                                                            }

                    .infobox {
                              position: absolute;
                                    top: 20px;
                                          right: 20px;
                                                background: #f8f8f8;
                                                      padding: 10px;
                                                            border: 1px solid #ccc;
                                                                  max-width: 250px;
                                                                      }

                        text {
                                  font: 12px sans-serif;
                                        pointer-events: none;
                                            }
                          </style>
    </head>
    <body>

        <svg width="1000" height="700"></svg>
        <div id="tooltip" class="tooltip" style="opacity: 0;"></div>
        <div id="infobox" class="infobox" style="display: none;"></div>

        <script>
              const svg = d3.select("svg");
                const width = +svg.attr("width");
                const height = +svg.attr("height");
                const tooltip = d3.select("#tooltip");
                const infobox = d3.select("#infobox");

                const zoomLayer = svg.append("g");

                const zoom = d3.zoom()
                  .scaleExtent([0.1, 5])
                  .on("zoom", (event) => {
                            zoomLayer.attr("transform", event.transform);
                          });

                svg.call(zoom);

                d3.json("genes.json").then(data => {
                        const { nodes, links } = data;

                        const simulation = d3.forceSimulation(nodes)
                          .force("link", d3.forceLink(links).id(d => d.id).distance(120))
                          .force("charge", d3.forceManyBody().strength(-250))
                          .force("center", d3.forceCenter(width / 2, height / 2));

                        const link = zoomLayer.append("g")
                          .attr("class", "links")
                          .selectAll("line")
                          .data(links)
                          .join("line")
                          .attr("class", "link")
                          .on("mouseover", (event, d) => {
                                      tooltip.transition().style("opacity", 1);
                                      tooltip.html(`Interaction: <strong>${d.interaction}</strong>`)
                                        .style("left", (event.pageX + 5) + "px")
                                        .style("top", (event.pageY - 28) + "px");
                                    })
                          .on("mouseout", () => {
                                      tooltip.transition().style("opacity", 0);
                                    });

                        const node = zoomLayer.append("g")
                          .attr("class", "nodes")
                          .selectAll("g")
                          .data(nodes)
                          .join("g")
                          .call(d3.drag()
                                      .on("start", dragStarted)
                                      .on("drag", dragged)
                                      .on("end", dragEnded))
                          .on("click", (event, d) => {
                                      infobox.style("display", "block")
                                        .html(`<strong>${d.id}</strong><br>${d.description}`);
                                    });

                        node.append("circle")
                          .attr("r", 10);

                        node.append("text")
                          .text(d => d.id)
                          .attr("x", 12)
                          .attr("y", 3);

                        simulation.on("tick", () => {
                                  link
                                    .attr("x1", d => d.source.x)
                                    .attr("y1", d => d.source.y)
                                    .attr("x2", d => d.target.x)
                                    .attr("y2", d => d.target.y);

                                  node
                                    .attr("transform", d => `translate(${d.x},${d.y})`);
                                });

                        function dragStarted(event, d) {
                                  if (!event.active) simulation.alphaTarget(0.3).restart();
                                  d.fx = d.x;
                                  d.fy = d.y;
                                }

                        function dragged(event, d) {
                                  d.fx = event.x;
                                  d.fy = event.y;
                                }

                        function dragEnded(event, d) {
                                  if (!event.active) simulation.alphaTarget(0);
                                  d.fx = null;
                                  d.fy = null;
                                }
                      });
        </script>
    </body>
</html>
